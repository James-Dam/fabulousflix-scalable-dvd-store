<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./payment-page.css">
    <title>Shopping Cart</title>
</head>

<body>
    <div>
        <h2 id="total_price"></h2>
    </div>

    <div>
        <form id="payment_form" method="post" action="#">
            <label><b>First Name</b></label>
            <label>
                <input name="first" placeholder="First Name" type="text">
            </label>
            <br>
            <label><b>Last Name</b></label>
            <label>
                <input name="last" placeholder="Last Name" type="text">
            </label>
            <br>
            <label><b>Credit Card Number</b></label>
            <label>
                <input name="number" placeholder="Credit Card Number" type="text">
            </label>
            <br>
            <label><b>Expiration Date</b></label>
            <label>
                <input name="date" placeholder="Expiration Date" type="text">
            </label>
            <br>

            <input type="submit" value="Place Order">
        </form>
    </div>

    <div class="back-button-container">
        <button onclick="goBackToMovies()" class="back-button">Go Back to Movie List</button>
    </div>

    <div class="error_message">
        <p id="error"></p>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
    <script src="payment-page.js"></script>
</body>

</html>
