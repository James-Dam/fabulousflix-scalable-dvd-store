<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="login.css">
    <title>Employee Login</title>
</head>

<body>
    <div id="welcome">
        <h1>Employee Login</h1>
    </div>

    <div id="login">
        <form id="employee_login_form" method="post" action="#">
            <label><b>Email</b></label>
            <label>
                <input name="email" placeholder="Enter Email" type="text">
            </label>
            <br>
            <label><b>Password</b></label>
            <label>
                <input name="password" placeholder="Enter Password" type="password">
            </label>
            <br>
            <input type="submit" value="Login">
            <div class="g-recaptcha" data-sitekey="6LfFBswqAAAAAPKvSG-nuFuKrV-Km8NnSd5JT3AD"></div>
        </form>
        <div id="employee_login_error_message"></div>
    </div>

    <!-- include jQuery-->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
    <!-- include our own JS file -->
    <script src="employee_login.js"></script>
    <script src='https://www.google.com/recaptcha/api.js' type="text/javascript"></script>
</body>
</html>
