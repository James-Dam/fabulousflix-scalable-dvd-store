<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./browse-movies.css">
    <title>Title</title>
</head>
<body>
    <h2>Browse by Letter:</h2>
    <div id="alphabet">
        <span class="letter" onclick="search_title('A')">A</span>
        <span class="letter" onclick="search_title('B')">B</span>
        <span class="letter" onclick="search_title('C')">C</span>
        <span class="letter" onclick="search_title('D')">D</span>
        <span class="letter" onclick="search_title('E')">E</span>
        <span class="letter" onclick="search_title('F')">F</span>
        <span class="letter" onclick="search_title('G')">G</span>
        <span class="letter" onclick="search_title('H')">H</span>
        <span class="letter" onclick="search_title('I')">I</span>
        <span class="letter" onclick="search_title('J')">J</span>
        <span class="letter" onclick="search_title('K')">K</span>
        <span class="letter" onclick="search_title('L')">L</span>
        <span class="letter" onclick="search_title('M')">M</span>
        <span class="letter" onclick="search_title('N')">N</span>
        <span class="letter" onclick="search_title('O')">O</span>
        <span class="letter" onclick="search_title('P')">P</span>
        <span class="letter" onclick="search_title('Q')">Q</span>
        <span class="letter" onclick="search_title('R')">R</span>
        <span class="letter" onclick="search_title('S')">S</span>
        <span class="letter" onclick="search_title('T')">T</span>
        <span class="letter" onclick="search_title('U')">U</span>
        <span class="letter" onclick="search_title('V')">V</span>
        <span class="letter" onclick="search_title('W')">W</span>
        <span class="letter" onclick="search_title('X')">X</span>
        <span class="letter" onclick="search_title('Y')">Y</span>
        <span class="letter" onclick="search_title('Z')">Z</span>
        <span class="letter" onclick="search_title('*')">*</span>
    </div>

    <h2>Browse by Genre:</h2>
    <div id="genres"></div>

    <div class="button-container">
        <button class="button" onclick="window.location.href='shopping-cart.html'">Checkout</button>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
    <script src="browse-movies.js"></script>
</body>
</html>
